# Deploy finance-backend - Azure Pipelines
trigger:
  branches:
    include: [main]

variables:
  - group: devgiglio-env
  - group: devgiglio-secrets
  - name: APP_NAME
    value: finance-backend

pool: Default

steps:
  - bash: |
      cd /opt/devgiglio
      docker compose rm -fsv finance-backend 2>/dev/null || true
      docker pull ghcr.io/gipierogiglio-prog/finance-backend:latest
      docker compose up -d --force-recreate finance-backend
    displayName: "Deploy"
