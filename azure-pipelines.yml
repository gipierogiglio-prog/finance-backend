# Deploy finance-backend - Azure Pipelines
trigger:
  branches:
    include: [main]

variables:
  - group: devgiglio-env
  - group: devgiglio-secrets
  - name: APP_NAME
    value: finance-backend

pool: devgiglio

steps:
  - bash: |
      echo $(GITHUB_TOKEN) | docker login ghcr.io -u gipierogiglio-prog --password-stdin
      docker build -t ghcr.io/gipierogiglio-prog/finance-backend:latest .
      docker push ghcr.io/gipierogiglio-prog/finance-backend:latest
    displayName: "Build, Login & Push"

  - bash: |
      cd /opt/devgiglio
      docker pull ghcr.io/gipierogiglio-prog/finance-backend:latest
      docker compose up -d --force-recreate finance-backend
    displayName: "Deploy via Docker Compose"
